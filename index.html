<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>개인 단어사전</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="단어사전" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%232d6a4f'/%3E%3Ctext x='96' y='140' font-family='Georgia,serif' font-size='120' font-weight='700' fill='%23f5f2ee' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=Noto+Sans+KR:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ee;
      --surface: #fdfbf8;
      --border: #e4dfd8;
      --border-soft: #ede9e3;
      --text: #1e1a16;
      --text-muted: #7a6f65;
      --text-sub: #9c9189;
      --accent: #2d6a4f;
      --accent-bg: #e8f5ee;
      --accent-border: #b7dfc9;
      --amber: #b5632a;
      --amber-bg: #fdf0e6;
      --red: #9b2335;
      --red-bg: #fdf0f1;
      --red-border: #f0c4c8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      /* font size scale */
      --fs: 14px;
      color-scheme: light;
    }
    html[data-fs="md"] { --fs: 16px; }
    html[data-fs="lg"] { --fs: 18px; }
    html[data-fs="xl"] { --fs: 20px; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: var(--fs);
      line-height: 1.6;
    }
    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(245,242,238,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
    }
    .header-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .logo-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--text); color: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif; font-size: 15px; font-weight: 700;
      flex-shrink: 0;
    }
    h1 {
      font-family: 'Lora', serif;
      font-size: 16px; font-weight: 500; margin: 0;
      color: var(--text); letter-spacing: -0.01em;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    input, textarea, select, button { font: inherit; }
    .search { flex: 1; min-width: 200px; position: relative; }
    .search::before {
      content: '⌕'; position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: var(--text-sub); font-size: 16px;
      pointer-events: none;
    }
    .search input {
      width: 100%; padding: 9px 12px 9px 32px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
    .filters { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .chipbtn {
      border: 1px solid var(--border); background: var(--surface);
      padding: 6px 12px; border-radius: 999px;
      cursor: pointer; user-select: none; color: var(--text-muted);
      font-size: 13px; transition: all .15s;
    }
    .chipbtn:hover { border-color: var(--accent); color: var(--accent); }
    .chipbtn[aria-pressed="true"] {
      border-color: var(--accent); background: var(--accent-bg);
      color: var(--accent); font-weight: 600;
    }
    /* ─── MAIN LAYOUT ─── */
    main {
      max-width: 1120px; margin: 0 auto;
      padding: 20px; display: grid;
      grid-template-columns: 1.1fr 0.9fr; gap: 16px;
    }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card h2 {
      font-size: 12px; font-weight: 600; margin: 0;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text-sub); letter-spacing: .06em; text-transform: uppercase;
    }
    /* ─── STATS BAR ─── */
    .stat {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border-soft);
      font-size: 12px; color: var(--text-muted);
    }
    .stat > span {
      padding: 8px 14px;
      border-right: 1px solid var(--border-soft);
    }
    .stat > span:last-child { border-right: none; margin-left: auto; }
    .stat b { color: var(--text); font-weight: 600; }
    .pill {
      padding: 3px 10px; border-radius: 999px;
      background: var(--accent-bg); border: 1px solid var(--accent-border);
      font-size: 11px; color: var(--accent); font-weight: 600;
    }
    /* ─── LIST ─── */
    .list { padding: 10px; max-height: calc(100vh - 280px); overflow-y: auto; }
    .list::-webkit-scrollbar { width: 5px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .item {
      border: 1px solid var(--border-soft); border-radius: 12px;
      padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
      margin-bottom: 8px; cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      background: var(--surface);
    }
    .item:last-child { margin-bottom: 0; }
    .item:hover {
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }
    .item.active { border-color: var(--accent); background: #fafdfb; }
    .item .meta { flex: 1; min-width: 0; }
    .wordline { display: flex; gap: 8px; align-items: baseline; }
    .word {
      font-family: 'Lora', serif; font-weight: 700; font-size: 17px;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }
    .pos {
      font-size: 11px; color: var(--amber); font-style: italic;
      font-family: 'Lora', serif;
      flex-shrink: 0;
    }
    .meaning { margin-top: 3px; color: var(--text); font-size: 13.5px; }
    .sub { margin-top: 4px; font-size: 11.5px; color: var(--text-sub); font-family: 'Fira Code', monospace; }
    .tags { margin-top: 7px; display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; padding: 2px 8px;
      border: 1px solid var(--border); border-radius: 999px;
      background: var(--bg); color: var(--text-muted);
    }
    .mastery-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .m0 { background: #d0ccc8; }
    .m1 { background: #e8a56a; }
    .m2 { background: #7fc8a4; }
    .m3 { background: var(--accent); }
    .actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .iconbtn {
      width: 32px; height: 32px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--surface);
      cursor: pointer; font-size: 15px; color: var(--text-muted);
      transition: all .15s; display: flex; align-items: center; justify-content: center;
    }
    .iconbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .iconbtn.fav-on { color: #d4870a; border-color: #f0c97a; background: #fffbee; }
    /* ─── BUTTONS ─── */
    .primary {
      border: none; background: var(--accent); color: white;
      padding: 9px 16px; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 13px; transition: filter .15s;
    }
    .primary:hover { filter: brightness(1.08); }
    .ghost {
      border: 1px solid var(--border); background: var(--surface);
      padding: 9px 14px; border-radius: 10px; cursor: pointer;
      color: var(--text-muted); font-size: 13px; transition: all .15s;
    }
    .ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .danger {
      border: 1px solid var(--red-border); background: var(--red-bg);
      color: var(--red); padding: 9px 14px; border-radius: 10px; cursor: pointer;
      font-size: 13px; transition: filter .15s;
    }
    .danger:hover { filter: brightness(0.96); }
    /* ─── FORM ─── */
    .form { padding: 14px 16px; display: grid; gap: 10px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
    label {
      font-size: 11px; color: var(--text-sub); font-weight: 600;
      display: block; margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg); color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg);
      background: var(--surface);
    }
    textarea { resize: vertical; min-height: 72px; }
    .muted { color: var(--text-sub); font-size: 11.5px; padding: 8px 16px; }
    .right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .mono { font-family: 'Fira Code', monospace; font-size: 13px; }
    /* ─── DIALOG ─── */
    dialog {
      border: none; border-radius: 16px; width: min(720px, 95vw);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      background: var(--surface);
    }
    dialog::backdrop { background: rgba(30,26,22,0.45); backdrop-filter: blur(2px); }
    .dlg { padding: 20px; }
    .dlg h3 { font-family: 'Lora', serif; font-size: 18px; margin: 0 0 12px 0; }
    .dlg .dlg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .kbd {
      font-size: 11px; border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 5px;
      background: var(--bg); font-family: 'Fira Code', monospace;
    }
    .empty-msg {
      padding: 32px 16px; text-align: center; color: var(--text-sub); font-size: 13px;
    }
    .empty-msg .kbd { font-size: 12px; }

    /* ─── FONT SIZE CONTROLS ─── */
    .fs-controls {
      display: flex; gap: 2px; align-items: center;
      margin-left: auto; flex-shrink: 0;
    }
    .fs-btn {
      border: 1px solid var(--border); background: var(--surface);
      border-radius: 8px; cursor: pointer; color: var(--text-muted);
      padding: 5px 9px; line-height: 1; transition: all .15s;
      font-family: 'Lora', serif;
    }
    .fs-btn:hover { border-color: var(--accent); color: var(--accent); }
    .fs-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); font-weight: 700; }

    /* ─── MOBILE ─── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      main { padding: 10px; gap: 10px; }
      .list { max-height: none; }
      .word { font-size: calc(var(--fs) * 1.2); }
      .chipbtn { padding: 7px 11px; }
      /* safe area for notch phones */
      body { padding-bottom: env(safe-area-inset-bottom); }
      header { padding-top: max(10px, env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo-mark">W</div>
    <h1>개인 단어사전</h1>
    <div class="fs-controls">
      <button class="fs-btn" data-fs="sm" title="작게">A</button>
      <button class="fs-btn" data-fs="md" title="보통" style="font-size:1.1em">A</button>
      <button class="fs-btn" data-fs="lg" title="크게" style="font-size:1.25em">A</button>
      <button class="fs-btn" data-fs="xl" title="매우 크게" style="font-size:1.4em">A</button>
    </div>
  </div>
  <div class="row">
    <div class="search">
      <input id="q" placeholder="단어/뜻/예문/태그 검색" autocomplete="off" />
    </div>
    <div class="filters">
      <button class="chipbtn" id="f_all" aria-pressed="true">전체</button>
      <button class="chipbtn" id="f_fav" aria-pressed="false">즐겨찾기</button>
      <button class="chipbtn" id="f_review" aria-pressed="false">복습필요(0~1)</button>
      <button class="ghost" id="btn_new" title="새 단어 추가 (N)">+ 추가</button>
      <button class="ghost" id="btn_export" title="JSON로 내보내기">내보내기</button>
      <button class="ghost" id="btn_import" title="JSON 불러오기">가져오기</button>
    </div>
  </div>
</header>

<main>
  <section class="card">
    <h2>단어 목록</h2>
    <div class="stat">
      <span>전체: <b id="stat_total">0</b></span>
      <span>즐겨찾기: <b id="stat_fav">0</b></span>
      <span>복습필요: <b id="stat_review">0</b></span>
      <span class="pill" id="stat_showing">표시: 0</span>
    </div>
    <div class="list" id="list"></div>
    <div class="empty-msg" id="empty" style="display:none;">
      단어가 없습니다. &nbsp;<span class="kbd">+ 추가</span>&nbsp; 버튼으로 단어를 넣으세요.
    </div>
  </section>

  <section class="card">
    <h2 id="form_title">단어 추가</h2>
    <div class="form">
      <div class="grid2">
        <div class="field">
          <label>단어 *</label>
          <input id="word" placeholder="예: maintain" />
        </div>
        <div class="field">
          <label>품사</label>
          <input id="pos" placeholder="예: verb / noun" />
        </div>
      </div>

      <div class="field">
        <label>뜻 *</label>
        <textarea id="meaning" placeholder="예: 유지하다"></textarea>
      </div>

      <div class="grid2">
        <div class="field">
          <label>한글식 발음</label>
          <input id="pron" placeholder="예: 메인테인" />
        </div>
        <div class="field">
          <label>IPA</label>
          <input id="ipa" class="mono" placeholder="예: /meɪnˈteɪn/" />
        </div>
      </div>

      <div class="field">
        <label>예문</label>
        <textarea id="ex" placeholder="예: The government must maintain public order."></textarea>
      </div>

      <div class="field">
        <label>예문 해석</label>
        <textarea id="exko" placeholder="예: 정부는 공공질서를 유지해야 한다."></textarea>
      </div>

      <div class="field">
        <label>개인 메모</label>
        <textarea id="notes" placeholder="헷갈리는 점, 팁 등"></textarea>
      </div>

      <div class="grid2">
        <div class="field">
          <label>태그 (쉼표로 구분)</label>
          <input id="tags" placeholder="예: 중요, 뉴스, 정치" />
        </div>
        <div class="field">
          <label>암기 상태 (0~3)</label>
          <select id="mastery">
            <option value="0">0 · 처음 봄</option>
            <option value="1">1 · 복습 필요</option>
            <option value="2">2 · 익숙함</option>
            <option value="3">3 · 암기 완료</option>
          </select>
        </div>
      </div>

      <div class="grid2">
        <button class="primary" id="btn_save">저장</button>
        <button class="ghost" id="btn_reset" title="폼 초기화 (Esc)">초기화</button>
      </div>
      <button class="danger" id="btn_delete" style="display:none;">삭제</button>
      <div class="muted">
        저장 위치: 이 브라우저의 localStorage (다른 PC/브라우저로 자동 동기화 안 됨)
      </div>
    </div>
  </section>
</main>

<dialog id="dlg_import">
  <div class="dlg">
    <h3>가져오기 (JSON)</h3>
    <div class="field">
      <label>내보내기한 JSON을 붙여넣기</label>
      <textarea id="import_text" class="mono" style="min-height:180px;"></textarea>
    </div>
    <div class="dlg-actions">
      <button class="ghost" id="btn_import_cancel">취소</button>
      <button class="primary" id="btn_import_ok">가져오기</button>
    </div>
    <div class="muted">형식이 맞지 않으면 실패합니다.</div>
  </div>
</dialog>

<script>
(() => {
  const STORAGE_KEY = "my_vocab_entries_v1";

  /** @type {Array<any>} */
  let entries = [];
  let selectedId = null; // 편집 중인 항목 id
  let filterMode = "all"; // all | fav | review

  // ---------- utils ----------
  const $ = (id) => document.getElementById(id);
  const nowISO = () => new Date().toISOString();
  const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

  function parseTags(text) {
    return (text || "")
      .split(",")
      .map(s => s.trim())
      .filter(Boolean);
  }

  function safeLower(s) { return (s || "").toString().toLowerCase(); }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(entries)) entries = [];
    } catch {
      entries = [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function stats() {
    const total = entries.length;
    const fav = entries.filter(e => !!e.isFavorite).length;
    const review = entries.filter(e => (Number(e.masteryLevel) || 0) <= 1).length;
    $("stat_total").textContent = String(total);
    $("stat_fav").textContent = String(fav);
    $("stat_review").textContent = String(review);
  }

  function matchesFilter(e) {
    if (filterMode === "fav") return !!e.isFavorite;
    if (filterMode === "review") return (Number(e.masteryLevel) || 0) <= 1;
    return true;
  }

  function matchesQuery(e, q) {
    if (!q) return true;
    const hay = [
      e.word, e.meaning, e.partOfSpeech, e.pronunciation, e.ipa,
      e.example, e.exampleTranslation, e.notes,
      ...(Array.isArray(e.tags) ? e.tags : [])
    ].map(safeLower).join(" | ");
    return hay.includes(q);
  }

  function masteryLabel(level) {
    const n = Number(level) || 0;
    if (n === 0) return "처음 봄";
    if (n === 1) return "복습 필요";
    if (n === 2) return "익숙함";
    if (n === 3) return "암기 완료";
    return "미정";
  }

  function setFilter(mode) {
    filterMode = mode;
    $("f_all").setAttribute("aria-pressed", mode === "all");
    $("f_fav").setAttribute("aria-pressed", mode === "fav");
    $("f_review").setAttribute("aria-pressed", mode === "review");
    renderList();
  }

  // ---------- rendering ----------
  function renderList() {
    const q = safeLower($("q").value.trim());
    const list = $("list");
    list.innerHTML = "";

    const filtered = entries
      .filter(matchesFilter)
      .filter(e => matchesQuery(e, q))
      .slice()
      .sort((a, b) => (a.word || "").localeCompare(b.word || "", "en"));

    $("stat_showing").textContent = `표시: ${filtered.length}`;
    $("empty").style.display = filtered.length ? "none" : "block";

    for (const e of filtered) {
      const item = document.createElement("div");
      item.className = "item";

      // mastery dot
      const dot = document.createElement("div");
      dot.className = `mastery-dot m${Number(e.masteryLevel) || 0}`;

      const meta = document.createElement("div");
      meta.className = "meta";

      const top = document.createElement("div");
      top.className = "wordline";

      const w = document.createElement("div");
      w.className = "word";
      w.textContent = e.word || "(no word)";

      const pos = document.createElement("div");
      pos.className = "pos";
      pos.textContent = (e.partOfSpeech || "").trim() || "—";

      top.appendChild(w);
      top.appendChild(pos);

      const meaning = document.createElement("div");
      meaning.className = "meaning";
      meaning.textContent = (e.meaning || "").trim() || "—";

      const sub = document.createElement("div");
      sub.className = "sub";
      const pron = (e.pronunciation || "").trim();
      const ipa = (e.ipa || "").trim();
      const m = Number(e.masteryLevel) || 0;
      sub.textContent = `${pron}${(pron && ipa) ? " · " : ""}${ipa}${(pron || ipa) ? " · " : ""}암기 ${m}/3 (${masteryLabel(m)})`;

      const tags = document.createElement("div");
      tags.className = "tags";
      const tagArr = Array.isArray(e.tags) ? e.tags : [];
      for (const t of tagArr) {
        const chip = document.createElement("span");
        chip.className = "tag";
        chip.textContent = t;
        tags.appendChild(chip);
      }

      meta.appendChild(top);
      meta.appendChild(meaning);
      meta.appendChild(sub);
      if (tagArr.length) meta.appendChild(tags);

      const actions = document.createElement("div");
      actions.className = "actions";

      const favBtn = document.createElement("button");
      favBtn.className = "iconbtn" + (e.isFavorite ? " fav-on" : "");
      favBtn.title = "즐겨찾기";
      favBtn.textContent = e.isFavorite ? "★" : "☆";
      favBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        toggleFavorite(e.id);
      });

      const editBtn = document.createElement("button");
      editBtn.className = "iconbtn";
      editBtn.title = "편집";
      editBtn.textContent = "✎";
      editBtn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        fillForm(e.id);
      });

      actions.appendChild(favBtn);
      actions.appendChild(editBtn);

      item.appendChild(dot);
      item.appendChild(meta);
      item.appendChild(actions);

      item.addEventListener("click", () => fillForm(e.id));
      list.appendChild(item);
    }
  }

  // ---------- CRUD ----------
  function resetForm() {
    selectedId = null;
    $("form_title").textContent = "단어 추가";
    $("btn_delete").style.display = "none";
    $("word").value = "";
    $("meaning").value = "";
    $("pos").value = "";
    $("pron").value = "";
    $("ipa").value = "";
    $("ex").value = "";
    $("exko").value = "";
    $("notes").value = "";
    $("tags").value = "";
    $("mastery").value = "0";
    $("word").focus();
  }

  function fillForm(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    selectedId = id;
    $("form_title").textContent = "단어 편집";
    $("btn_delete").style.display = "block";
    $("word").value = e.word || "";
    $("meaning").value = e.meaning || "";
    $("pos").value = e.partOfSpeech || "";
    $("pron").value = e.pronunciation || "";
    $("ipa").value = e.ipa || "";
    $("ex").value = e.example || "";
    $("exko").value = e.exampleTranslation || "";
    $("notes").value = e.notes || "";
    $("tags").value = (Array.isArray(e.tags) ? e.tags.join(", ") : "");
    $("mastery").value = String(Number(e.masteryLevel) || 0);
    $("word").focus();
  }

  function upsertFromForm() {
    const word = $("word").value.trim();
    const meaning = $("meaning").value.trim();
    if (!word || !meaning) {
      alert("단어와 뜻은 필수입니다.");
      return;
    }

    const data = {
      word,
      meaning,
      partOfSpeech: $("pos").value.trim(),
      pronunciation: $("pron").value.trim(),
      ipa: $("ipa").value.trim(),
      example: $("ex").value.trim(),
      exampleTranslation: $("exko").value.trim(),
      notes: $("notes").value.trim(),
      tags: parseTags($("tags").value),
      masteryLevel: Number($("mastery").value) || 0,
      updatedAt: nowISO(),
    };

    if (selectedId) {
      const idx = entries.findIndex(e => e.id === selectedId);
      if (idx === -1) {
        // 이상 케이스: 선택 id가 없으면 새로 생성
        entries.unshift({ id: uid(), isFavorite: false, createdAt: nowISO(), ...data });
      } else {
        entries[idx] = { ...entries[idx], ...data };
      }
    } else {
      entries.unshift({
        id: uid(),
        isFavorite: false,
        createdAt: nowISO(),
        ...data,
      });
    }

    save();
    stats();
    renderList();
    resetForm();
  }

  function removeSelected() {
    if (!selectedId) return;
    const e = entries.find(x => x.id === selectedId);
    if (!e) return;
    const ok = confirm(`삭제할까요?\n\n${e.word}`);
    if (!ok) return;
    entries = entries.filter(x => x.id !== selectedId);
    save();
    stats();
    renderList();
    resetForm();
  }

  function toggleFavorite(id) {
    const idx = entries.findIndex(e => e.id === id);
    if (idx === -1) return;
    entries[idx].isFavorite = !entries[idx].isFavorite;
    entries[idx].updatedAt = nowISO();
    save();
    stats();
    renderList();
    if (selectedId === id) fillForm(id);
  }

  // ---------- import/export ----------
  function exportJSON() {
    const payload = {
      version: 1,
      exportedAt: nowISO(),
      entries,
    };
    const text = JSON.stringify(payload, null, 2);

    // 파일 저장 시도
    try {
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `vocab_export_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch {
      // fallback: 클립보드
      navigator.clipboard?.writeText(text);
      alert("파일 저장이 실패하여 클립보드에 복사했습니다.");
    }
  }

  function openImportDialog() {
    $("import_text").value = "";
    $("dlg_import").showModal();
    $("import_text").focus();
  }

  function importJSON() {
    const raw = $("import_text").value.trim();
    if (!raw) { alert("붙여넣은 JSON이 없습니다."); return; }
    let obj;
    try {
      obj = JSON.parse(raw);
    } catch {
      alert("JSON 파싱 실패: 형식이 올바르지 않습니다.");
      return;
    }

    // 허용 포맷:
    // 1) {version, entries:[...]}
    // 2) entries 배열만 단독으로 들어오는 경우
    let incoming = [];
    if (Array.isArray(obj)) incoming = obj;
    else if (obj && Array.isArray(obj.entries)) incoming = obj.entries;

    if (!Array.isArray(incoming)) {
      alert("가져오기 실패: entries 배열이 없습니다.");
      return;
    }

    // 최소 필드 검증 및 정규화
    const normalized = incoming
      .filter(x => x && typeof x === "object")
      .map(x => ({
        id: (x.id && String(x.id)) || uid(),
        word: (x.word && String(x.word)) || "",
        meaning: (x.meaning && String(x.meaning)) || "",
        partOfSpeech: (x.partOfSpeech && String(x.partOfSpeech)) || "",
        pronunciation: (x.pronunciation && String(x.pronunciation)) || "",
        ipa: (x.ipa && String(x.ipa)) || "",
        example: (x.example && String(x.example)) || "",
        exampleTranslation: (x.exampleTranslation && String(x.exampleTranslation)) || "",
        notes: (x.notes && String(x.notes)) || "",
        tags: Array.isArray(x.tags) ? x.tags.map(String) : parseTags(String(x.tags || "")),
        isFavorite: !!x.isFavorite,
        masteryLevel: Number(x.masteryLevel) || 0,
        createdAt: x.createdAt ? String(x.createdAt) : nowISO(),
        updatedAt: x.updatedAt ? String(x.updatedAt) : nowISO(),
      }))
      .filter(x => x.word.trim() && x.meaning.trim());

    if (!normalized.length) {
      alert("가져올 데이터가 없습니다(단어/뜻 필수).");
      return;
    }

    const ok = confirm(
      `가져오기 항목 수: ${normalized.length}\n\n` +
      `현재 데이터를 덮어쓸까요?\n(확인=덮어쓰기 / 취소=합치기)`
    );

    if (ok) {
      entries = normalized;
    } else {
      // 합치기: id 기준 병합, 없으면 추가
      const map = new Map(entries.map(e => [e.id, e]));
      for (const n of normalized) map.set(n.id, n);
      entries = Array.from(map.values());
    }

    save();
    stats();
    renderList();
    resetForm();
    $("dlg_import").close();
  }

  // ---------- events ----------
  $("btn_save").addEventListener("click", upsertFromForm);
  $("btn_reset").addEventListener("click", resetForm);
  $("btn_delete").addEventListener("click", removeSelected);

  $("q").addEventListener("input", renderList);

  $("f_all").addEventListener("click", () => setFilter("all"));
  $("f_fav").addEventListener("click", () => setFilter("fav"));
  $("f_review").addEventListener("click", () => setFilter("review"));

  $("btn_new").addEventListener("click", resetForm);

  $("btn_export").addEventListener("click", exportJSON);
  $("btn_import").addEventListener("click", openImportDialog);
  $("btn_import_cancel").addEventListener("click", () => $("dlg_import").close());
  $("btn_import_ok").addEventListener("click", importJSON);

  window.addEventListener("keydown", (e) => {
    // N: 새로 추가(폼 초기화)
    if (e.key.toLowerCase() === "n" && (e.ctrlKey || e.metaKey) === false) {
      // 입력 중일 때 방해 줄이기 위해, textarea에서 N은 무시
      const tag = (document.activeElement?.tagName || "").toLowerCase();
      if (tag !== "input" && tag !== "textarea") resetForm();
    }
    // Esc: 초기화
    if (e.key === "Escape") {
      if ($("dlg_import").open) $("dlg_import").close();
      else resetForm();
    }
  });

  // ---------- init ----------
  load();
  stats();
  renderList();
  resetForm();

  // 샘플 데이터가 완전 비어있을 때 안내를 위해 1회 메시지
  if (entries.length === 0) {
    $("empty").style.display = "block";
  }
  // ---------- font size ----------
  const FS_KEY = 'vocab_fs';
  const fsBtns = document.querySelectorAll('.fs-btn[data-fs]');
  function applyFs(val) {
    document.documentElement.setAttribute('data-fs', val);
    fsBtns.forEach(b => b.classList.toggle('active', b.dataset.fs === val));
    localStorage.setItem(FS_KEY, val);
  }
  fsBtns.forEach(b => b.addEventListener('click', () => applyFs(b.dataset.fs)));
  applyFs(localStorage.getItem(FS_KEY) || 'sm');

})();

// ---------- service worker ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
